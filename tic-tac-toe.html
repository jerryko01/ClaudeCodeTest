<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic-Tac-Toe</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f4f5f7;
    --panel: #ffffff;
    --text: #1b1e23;
    --muted: #6b7280;
    --accent-x: #2563eb;
    --accent-o: #dc2626;
    --line: #d1d5db;
    --win: #16a34a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161a;
      --panel: #1e2127;
      --text: #f2f3f5;
      --muted: #9aa1ab;
      --accent-x: #60a5fa;
      --accent-o: #f87171;
      --line: #3a3f47;
      --win: #4ade80;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .app {
    background: var(--panel);
    border-radius: 16px;
    padding: 32px;
    width: min(420px, 90vw);
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    text-align: center;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 1.5rem;
    letter-spacing: 0.02em;
  }
  .status {
    margin: 0 0 20px;
    min-height: 1.4em;
    color: var(--muted);
    font-size: 1rem;
  }
  .status.win { color: var(--win); font-weight: 600; }
  .mode {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .mode button {
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .mode button.active {
    background: var(--text);
    color: var(--panel);
    border-color: var(--text);
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 0 auto 20px;
    width: 100%;
    max-width: 320px;
    aspect-ratio: 1;
  }
  .cell {
    background: var(--bg);
    border: none;
    border-radius: 10px;
    font-size: 2.5rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text);
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .cell:hover:not(:disabled) {
    background: var(--line);
  }
  .cell:disabled {
    cursor: default;
  }
  .cell.x { color: var(--accent-x); }
  .cell.o { color: var(--accent-o); }
  .cell.win-cell {
    background: color-mix(in srgb, var(--win) 25%, var(--bg));
  }
  .reset {
    border: none;
    background: var(--text);
    color: var(--panel);
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }
  .reset:active { transform: scale(0.97); }
  .score {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 18px 0 4px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .score span { font-weight: 700; color: var(--text); }
</style>
</head>
<body>
<div class="app">
  <h1>Tic-Tac-Toe</h1>
  <p class="status" id="status">X's turn</p>

  <div class="mode">
    <button id="mode-2p" class="active">2 Player</button>
    <button id="mode-cpu">Vs Computer</button>
  </div>

  <div class="board" id="board"></div>

  <button class="reset" id="reset">New Round</button>

  <div class="score">
    <div>X wins <span id="score-x">0</span></div>
    <div>Draws <span id="score-d">0</span></div>
    <div>O wins <span id="score-o">0</span></div>
  </div>
</div>

<script>
(function () {
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const resetBtn = document.getElementById('reset');
  const mode2p = document.getElementById('mode-2p');
  const modeCpu = document.getElementById('mode-cpu');
  const scoreXEl = document.getElementById('score-x');
  const scoreOEl = document.getElementById('score-o');
  const scoreDEl = document.getElementById('score-d');

  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let board = Array(9).fill(null);
  let current = 'X';
  let gameOver = false;
  let vsCpu = false;
  const scores = { X: 0, O: 0, D: 0 };

  const cells = [];
  for (let i = 0; i < 9; i++) {
    const btn = document.createElement('button');
    btn.className = 'cell';
    btn.addEventListener('click', () => handleMove(i));
    boardEl.appendChild(btn);
    cells.push(btn);
  }

  function checkWinner(b) {
    for (const line of WIN_LINES) {
      const [a, c, d] = line;
      if (b[a] && b[a] === b[c] && b[a] === b[d]) {
        return { player: b[a], line };
      }
    }
    return null;
  }

  function isDraw(b) {
    return b.every(v => v !== null);
  }

  function render() {
    cells.forEach((cell, i) => {
      cell.textContent = board[i] || '';
      cell.className = 'cell' + (board[i] ? ' ' + board[i].toLowerCase() : '');
      cell.disabled = !!board[i] || gameOver;
    });
  }

  function handleMove(i) {
    if (board[i] || gameOver) return;
    board[i] = current;
    afterMove();
    if (!gameOver && vsCpu && current === 'O') {
      render();
      statusEl.textContent = "Computer thinking...";
      setTimeout(cpuMove, 350);
    }
  }

  function afterMove() {
    const result = checkWinner(board);
    if (result) {
      gameOver = true;
      scores[result.player]++;
      updateScores();
      statusEl.textContent = `${result.player} wins!`;
      statusEl.classList.add('win');
      render();
      result.line.forEach(idx => cells[idx].classList.add('win-cell'));
      return;
    }
    if (isDraw(board)) {
      gameOver = true;
      scores.D++;
      updateScores();
      statusEl.textContent = "It's a draw!";
      render();
      return;
    }
    current = current === 'X' ? 'O' : 'X';
    statusEl.textContent = `${current}'s turn`;
    render();
  }

  function cpuMove() {
    if (gameOver) return;
    const move = bestMove();
    if (move !== -1) {
      board[move] = 'O';
      afterMove();
    }
  }

  function bestMove() {
    const empty = board.map((v, i) => v === null ? i : -1).filter(i => i !== -1);

    for (const i of empty) {
      const copy = board.slice();
      copy[i] = 'O';
      if (checkWinner(copy)) return i;
    }
    for (const i of empty) {
      const copy = board.slice();
      copy[i] = 'X';
      if (checkWinner(copy)) return i;
    }
    if (board[4] === null) return 4;
    const corners = [0, 2, 6, 8].filter(i => board[i] === null);
    if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
    return empty.length ? empty[Math.floor(Math.random() * empty.length)] : -1;
  }

  function updateScores() {
    scoreXEl.textContent = scores.X;
    scoreOEl.textContent = scores.O;
    scoreDEl.textContent = scores.D;
  }

  function resetRound() {
    board = Array(9).fill(null);
    current = 'X';
    gameOver = false;
    statusEl.classList.remove('win');
    statusEl.textContent = "X's turn";
    render();
  }

  resetBtn.addEventListener('click', resetRound);

  mode2p.addEventListener('click', () => {
    vsCpu = false;
    mode2p.classList.add('active');
    modeCpu.classList.remove('active');
    resetRound();
  });

  modeCpu.addEventListener('click', () => {
    vsCpu = true;
    modeCpu.classList.add('active');
    mode2p.classList.remove('active');
    resetRound();
  });

  render();
})();
</script>
</body>
</html>
